# this better work
name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: pwmgr-linux
          - os: windows-latest
            artifact: pwmgr-windows
          - os: macos-latest
            artifact: pwmgr-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Tk system libraries (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: >-
          pyinstaller --onefile --windowed --name pwmgr
          --add-data "bad_passwords.txt:."
          --collect-all customtkinter
          main.py

      - name: Zip app bundle (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ${{ matrix.artifact }}.zip pwmgr.app

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.zip
          if-no-files-found: error

      - name: Upload artifact (Linux / Windows)
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/pwmgr*
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
